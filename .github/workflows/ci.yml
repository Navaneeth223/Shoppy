name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint server
        run: npm run lint
        working-directory: server

      - name: Lint web app
        run: npm run lint
        working-directory: apps/web

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run server tests
        run: npm test
        working-directory: server
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/nexus_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          STRIPE_SECRET_KEY: sk_test_placeholder

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: server/coverage

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Run web tests
        run: npm test
        working-directory: apps/web
        env:
          VITE_API_URL: http://localhost:5000/api/v1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-server, test-web]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: /api/v1
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}

      - name: Build Docker images (test)
        run: |
          docker build -f infrastructure/docker/Dockerfile.server -t nexus-server:test ./server
          docker build -f infrastructure/docker/Dockerfile.web -t nexus-web:test ./apps/web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7
