version: '3.9'

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: nexus_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: nexus_commerce
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nexus_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 5s
      retries: 5

  # ─── API Server ──────────────────────────────────────────────────────────────
  server:
    build:
      context: ../server
      dockerfile: ../infrastructure/docker/Dockerfile.server
    container_name: nexus_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ../server/.env
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/nexus_commerce
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../server/src:/app/src
      - server_logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Web App ─────────────────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    container_name: nexus_web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.nginx
    container_name: nexus_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - server
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  server_logs:
  nginx_logs:

networks:
  default:
    name: nexus_network
